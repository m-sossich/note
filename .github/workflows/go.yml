name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Format
      run: test -z "$(gofmt -l .)" || { gofmt -l . >&2; exit 1; }

    - name: Vet
      run: go vet ./...

    - name: Build
      run: go build -v ./...

    - name: Test (unit)
      run: go test ./pkg/codec/... ./pkg/dht/... ./pkg/wire/... -v -count=1

    - name: Test (integration)
      run: go test ./pkg/discovery/... ./pkg/node/... -v -count=1 -timeout 30s

    - name: Test (e2e)
      run: go test ./demo/... -v -count=1 -timeout 60s

    - name: Coverage
      run: go test ./... -coverprofile=coverage.out -covermode=atomic -timeout 60s

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.out
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
